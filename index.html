<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chơi game với quyt khonggg?</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; text-align: center;
            touch-action: manipulation; /* Tối ưu chạm mobile */
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 10;}
        .active { display: flex !important; animation: fadeIn 0.8s ease-in-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        h1 { color: #ff4757; font-size: 24px; margin-bottom: 20px; padding: 0 15px; line-height: 1.4; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        
        .buttons { margin-top: 20px; display: flex; gap: 15px; justify-content: center; width: 100%; flex-wrap: wrap; }
        button { padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); -webkit-tap-highlight-color: transparent;}
        
        #btnYes { background-color: #ff6b81; color: white; animation: pulse 1.5s infinite; z-index: 2; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,107,129,0.6); } 70% { box-shadow: 0 0 0 15px rgba(255,107,129,0); } 100% { box-shadow: 0 0 0 0 rgba(255,107,129,0); } }
        
        #btnNo { background-color: #f1f2f6; color: #2f3542; z-index: 1;}
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        
        img { width: 220px; min-height: 220px; border-radius: 20px; margin-bottom: 15px; object-fit: cover; pointer-events: none; transition: 0.3s;}

        .floating-hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .heart { position: absolute; bottom: -10%; font-size: 24px; animation: floatUp 4s ease-in forwards; opacity: 0.7; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }

        /* Tối ưu mobile màn hình nhỏ */
        @media (max-width: 380px) {
            h1 { font-size: 20px; }
            img { width: 180px; min-height: 180px; }
            button { padding: 10px 25px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="heartContainer"></div>

    <div id="intro" class="screen active">
        <h1>Xin chào người xinh đẹp cute dễ thương nhất thế giới nhaaa ✨✨✨</h1>
    </div>

    <div id="question" class="screen">
        <img id="catImg" src="https://media1.tenor.com/m/Y3NDz0nK2TQAAAAd/peach-goma.gif" alt="Mèo Cute">
        <h1>Cậu có muốn chơi game cùng quyt khongggg 🥺</h1>
        <div class="buttons">
            <button id="btnYes" onclick="sayYes()">Có nhaa 💖</button>
            <button id="btnNo" onclick="sayNo()">Không 😤</button>
        </div>
    </div>

    <div id="success" class="screen">
        <img id="hugImg" src="https://media1.tenor.com/m/8n5yCqLauqMAAAAd/peach-and-goma-hug.gif" alt="Mèo Ôm">
        <h1>Tuyệt vờiiii! Vào game thoi! 🎮🚀</h1>
    </div>

    <script>
        // Hiệu ứng mưa trái tim (giảm nhẹ tần suất để mượt hơn trên mobile)
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['💖', '✨', '🌸', '🎮'][Math.floor(Math.random() * 4)];
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px'; // Thu nhỏ trái tim một chút
            document.getElementById('heartContainer').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 500);

        // Chuyển màn hình sau 4 giây (Tăng 0.5s để đủ thời gian đọc lời chào dài)
        setTimeout(() => {
            const intro = document.getElementById('intro');
            const question = document.getElementById('question');
            if(intro && question) {
                intro.classList.remove('active');
                question.classList.add('active');
            }
        }, 4000);

        let yesScale = 1;
        let noScale = 1;
        
        // Xử lý nút Không (Đã THÊM LOGIC ĐỔI NHÃN DÁN KHÓC)
        function sayNo() {
            // Hệ số phóng to/thu nhỏ tối ưu cho Mobile
            yesScale += 0.25; 
            noScale -= 0.15;
            if (noScale < 0.3) noScale = 0.3; // Giới hạn thu nhỏ không quá bé
            
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            
            if(btnYes && btnNo) {
                btnYes.style.transform = `scale(${yesScale})`;
                btnNo.style.transform = `scale(${noScale})`;
                
                // Hiệu ứng rung phản đối
                btnNo.classList.remove('shake');
                void btnNo.offsetWidth; // reset animation
                btnNo.classList.add('shake');
                
                // Đổi nhãn dán thành mèo khóc rưng rưng rưng nước mắt
                document.getElementById('catImg').src = "https://media1.tenor.com/m/Tl3b_9X-3kQAAAAd/peach-goma.gif";
                
                // Đổi nội dung nút "Không" ngẫu nhiên
                const noTexts = ["Cậu chắc chưaa?", "Nghĩ lại đii 🥺", "Đừng bấm màaa", "Thật sự khong à?"];
                btnNo.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
            }
        }

        // Xử lý nút Có
        function sayYes() {
            const question = document.getElementById('question');
            const success = document.getElementById('success');
            if(question && success) {
                question.classList.remove('active');
                success.classList.add('active');
                // Tắt hiệu ứng mưa trái tim để mượt mà khi hiện kết quả
                clearInterval(floatingHeartsInterval);
            }
        }
        // Gán interval vào biến để có thể clearInterval
        const floatingHeartsInterval = setInterval(createHeart, 500);
    </script>
</body>
</html>
