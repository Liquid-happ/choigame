<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chơi game với quyt khonggg?</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; text-align: center; touch-action: manipulation;
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; z-index: 10;}
        .active { display: flex !important; animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        h1 { color: #ff4757; font-size: 24px; margin-bottom: 20px; padding: 0 15px; line-height: 1.4; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); z-index: 2;}
        
        .buttons { margin-top: 20px; display: flex; gap: 15px; justify-content: center; width: 100%; flex-wrap: wrap; z-index: 2;}
        button { padding: 12px 30px; font-size: 18px; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); -webkit-tap-highlight-color: transparent;}
        
        #btnYes { background-color: #ff6b81; color: white; animation: pulse 1.5s infinite; z-index: 2; position: relative; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255,107,129,0.6); } 70% { box-shadow: 0 0 0 15px rgba(255,107,129,0); } 100% { box-shadow: 0 0 0 0 rgba(255,107,129,0); } }
        
        #btnNo { background-color: #f1f2f6; color: #2f3542; z-index: 1; position: relative; }
        .shake { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-5px); } 40%, 80% { transform: translateX(5px); } }
        
        /* Hiệu ứng gõ chữ */
        .typing-wrapper { display: inline-block; width: auto; max-width: 95vw; margin-top: 15px;}
        .typing-effect { overflow: hidden; white-space: nowrap; border-right: 4px solid #ff4757; width: 0; animation: typing 3.5s steps(40, end) forwards, blink .75s step-end infinite; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink { from, to { border-color: transparent } 50% { border-color: #ff4757; } }

        /* Style cho ảnh local */
        .local-gif {
            width: 250px;
            max-height: 250px;
            border-radius: 20px;
            margin-bottom: 10px;
            object-fit: cover;
            pointer-events: none;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            background-color: rgba(255, 255, 255, 0.4);
            z-index: 2;
        }

        /* Trái tim bay */
        .floating-hearts { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .heart { position: absolute; bottom: -10%; font-size: 24px; animation: floatUp 4s ease-in forwards; opacity: 0.7; }
        @keyframes floatUp { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; } }

        @media (max-width: 380px) {
            h1 { font-size: 20px; }
            .local-gif { width: 200px; }
            button { padding: 10px 25px; font-size: 16px; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="heartContainer"></div>

    <div id="intro" class="screen active">
        <img class="local-gif" src="Happy I Love You GIF by Warner Bros. Deutschland.gif" alt="Chào">
        <div class="typing-wrapper">
            <h1 class="typing-effect">Xin chào người xinh đẹp cute dễ thương nhất thế giới nhaaa ✨✨✨</h1> 
        </div>
    </div>

    <div id="question" class="screen">
        <img class="local-gif" id="catImg" src="kisses feel GIF.gif" alt="Hỏi">
        <h1>Cậu có muốn chơi game cùng quyt khongggg 🥺</h1>
        <div class="buttons">
            <button id="btnYes" onclick="sayYes()">Có nhaa 💖</button>
            <button id="btnNo" onclick="sayNo()">Không 😤</button>
        </div>
    </div>

    <div id="success" class="screen">
        <img class="local-gif" src="Happy Celebration GIF.gif" alt="Tuyệt vời">
        <h1>Tuyệt vờiiii! Vào game thoi! 🎮🚀</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['💖', '✨', '🌸', '🎮'][Math.floor(Math.random() * 4)];
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.getElementById('heartContainer').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 400);

        // Chuyển màn hình sau 5s (Cho người ấy đủ thời gian xem GIF lúc chào và đọc chữ)
        setTimeout(() => {
            const intro = document.getElementById('intro');
            const question = document.getElementById('question');
            if(intro && question) {
                intro.classList.remove('active');
                question.classList.add('active');
            }
        }, 5000);

        let yesScale = 1;
        let noScale = 1;
        
        function sayNo() {
            yesScale += 0.25; 
            noScale -= 0.1;
            if (noScale < 0.5) noScale = 0.5; 
            
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            
            if(btnYes && btnNo) {
                btnYes.style.transform = `scale(${yesScale})`;
                btnNo.style.transform = `scale(${noScale})`;
                
                // Hiệu ứng rung nút Không
                btnNo.classList.remove('shake');
                void btnNo.offsetWidth; 
                btnNo.classList.add('shake');
                
                // Đổi text ngẫu nhiên
                const noTexts = ["Cậu chắc chưaa?", "Nghĩ lại đii 🥺", "Đừng bấm màaa", "Thật sự khong à?"];
                btnNo.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
            }
        }

        function sayYes() {
            const question = document.getElementById('question');
            const success = document.getElementById('success');
            if(question && success) {
                question.classList.remove('active');
                success.classList.add('active');
            }
            
            if (typeof confetti === "function") {
                var duration = 3 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff9a9e', '#fecfef', '#a1c4fd'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff9a9e', '#fecfef', '#a1c4fd'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        }
    </script>
</body>
</html>
