<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chơi game với quyt khonggg?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fecfef, #a1c4fd, #c2e9fb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            position: relative;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .screen {
            display: none; 
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 10;
        }
        
        .active {
            display: flex !important; 
            animation: popIn 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        h1 {
            color: #ff4757;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            padding: 0 20px;
        }
        
        .typing-wrapper {
            display: inline-block;
        }
        
        .typing-effect {
            overflow: hidden;
            white-space: nowrap;
            border-right: 4px solid #ff4757;
            width: 0;
            animation: typing 2.5s steps(30, end) forwards, blink .75s step-end infinite;
        }
        
        .buttons {
            margin-top: 30px;
            display: flex;
            gap: 30px;
            align-items: center;
            justify-content: center;
            height: 120px; 
        }
        
        button {
            padding: 15px 40px;
            font-size: 1.5rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }
        
        #btnYes {
            background-color: #ff6b81;
            color: white;
            animation: pulse 1.5s infinite;
        }
        
        #btnYes:hover {
            background-color: #ff4757;
            box-shadow: 0 15px 20px rgba(255, 107, 129, 0.4);
            transform: translateY(-3px) scale(1.05) !important; 
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 129, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 107, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 129, 0); }
        }
        
        #btnNo {
            background-color: #f1f2f6;
            color: #2f3542;
        }
        
        .shake {
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        img {
            width: 250px;
            min-height: 250px;
            border-radius: 20px;
            margin-bottom: 20px;
            pointer-events: none;
            transition: transform 0.3s;
            object-fit: cover;
        }

        img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        /* Khung Emoji dự phòng */
        .emoji-fallback {
            display: none;
            font-size: 120px;
            margin-bottom: 20px;
            animation: popIn 0.5s ease-out;
        }

        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: absolute;
            bottom: -10%;
            font-size: 24px;
            animation: floatUp 4s ease-in forwards;
            opacity: 0.7;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-120vh) rotate(360deg); opacity: 0; }
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }
        
        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: #ff4757; }
        }
    </style>
</head>
<body>

    <div class="floating-hearts" id="heartContainer"></div>

    <div id="intro" class="screen active">
        <div class="typing-wrapper">
            <h1 class="typing-effect">Xin chào người xinh đẹp cute dễ thương nhất thế giới nhaaa ✨✨✨</h1> 
        </div>
    </div>

    <div id="question" class="screen">
        <img id="catImg" 
             src="https://media1.tenor.com/m/Y3NDz0nK2TQAAAAd/peach-goma.gif" 
             onerror="this.onerror=function(){this.style.display='none'; document.getElementById('catEmoji').style.display='block';}; this.src='https://i.pinimg.com/originals/30/85/65/308565fb66dc6f578703edc983c21a41.gif';" 
             alt="Mèo Cute">
        
        <div id="catEmoji" class="emoji-fallback">🥺</div>

        <h1>Cậu có muốn chơi game cùng quyttt khongggg 🥺</h1>
        <div class="buttons">
            <button id="btnYes" onclick="sayYes()">Có nhaa 💖</button>
            <button id="btnNo" onclick="sayNo()">Không 😤</button>
        </div>
    </div>

    <div id="success" class="screen">
        <img id="hugImg" 
             src="https://media1.tenor.com/m/8n5yCqLauqMAAAAd/peach-and-goma-hug.gif" 
             onerror="this.onerror=function(){this.style.display='none'; document.getElementById('hugEmoji').style.display='block';}; this.src='https://i.pinimg.com/originals/db/5b/7d/db5b7d1e0f0dfc89e27c13fb01fbba6c.gif';" 
             alt="Mèo Ôm Nhau">
        
        <div id="hugEmoji" class="emoji-fallback">🤗💖</div>

        <h1>Tuyệt vờiiii! Vào game thoi! 🎮🚀</h1>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['💖', '✨', '🌸', '🎮'][Math.floor(Math.random() * 4)];
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 3 + 's';
            heart.style.fontSize = Math.random() * 20 + 15 + 'px';
            document.getElementById('heartContainer').appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);

        setTimeout(() => {
            document.getElementById('intro').classList.remove('active');
            document.getElementById('question').classList.add('active');
        }, 3500);

        let yesScale = 1;
        let noScale = 1;
        
        function sayNo() {
            yesScale += 0.4;
            noScale -= 0.15;
            if (noScale < 0) noScale = 0;
            const btnYes = document.getElementById('btnYes');
            const btnNo = document.getElementById('btnNo');
            btnYes.style.transform = `scale(${yesScale})`;
            btnNo.style.transform = `scale(${noScale})`;
            btnNo.classList.remove('shake');
            void btnNo.offsetWidth; 
            btnNo.classList.add('shake');
            
            // Đổi ảnh thành mèo khóc lóc, kèm hệ thống chống lỗi
            const imgEl = document.getElementById('catImg');
            const emojiEl = document.getElementById('catEmoji');
            
            imgEl.onerror = function() {
                this.style.display = 'none';
                emojiEl.style.display = 'block';
                emojiEl.innerText = '😭'; // Đổi emoji thành khóc
            };
            imgEl.src = "https://i.pinimg.com/originals/18/b9/eb/18b9ebba910ea2a5cc24aebac4dd3e88.gif";
            
            const noTexts = ["Cậu chắc chưaa?", "Nghĩ lại đii 🥺", "Đừng bấm màaa", "Thật sự khong à?"];
            btnNo.innerText = noTexts[Math.floor(Math.random() * noTexts.length)];
        }

        function sayYes() {
            document.getElementById('question').classList.remove('active');
            document.getElementById('success').classList.add('active');
            
            if (typeof confetti === "function") {
                var duration = 3 * 1000;
                var end = Date.now() + duration;
                (function frame() {
                    confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff9a9e', '#fecfef', '#a1c4fd'] });
                    confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#ff9a9e', '#fecfef', '#a1c4fd'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            }
        }
    </script>
</body>
</html>
